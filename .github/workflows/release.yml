name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump for manual releases
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@oleander"

      - name: Prepare release version
        id: release
        env:
          BUMP: ${{ inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              echo "Manual releases must run from main, got ${GITHUB_REF_NAME}" >&2
              exit 1
            fi

            case "$BUMP" in
              patch|minor|major) ;;
              *) echo "Unsupported bump: $BUMP" >&2; exit 1 ;;
            esac

            node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");

          const bump = process.env.BUMP;
          const pkgPath = "package.json";
          const pkg = JSON.parse(readFileSync(pkgPath, "utf8"));
          const parts = pkg.version.split(".").map(Number);

          if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part) || part < 0)) {
            throw new Error(`Unsupported package version: ${pkg.version}`);
          }

          if (bump === "major") {
            parts[0] += 1;
            parts[1] = 0;
            parts[2] = 0;
          } else if (bump === "minor") {
            parts[1] += 1;
            parts[2] = 0;
          } else {
            parts[2] += 1;
          }

          pkg.version = parts.join(".");
          writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag already exists: $TAG" >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "Release ${TAG}"
            git push origin HEAD:main

            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "target=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG_VERSION="${GITHUB_REF_NAME#v}"

            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "package.json version $VERSION does not match tag ${GITHUB_REF_NAME}" >&2
              exit 1
            fi

            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run TypeScript check
        run: bunx tsc --noEmit

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Build precompiled binary
        run: bun run compile

      - name: Package binary
        run: |
          ARCH="$(uname -m)"
          tar -C dist -czf "dist/mcp-env-keychain-macos-${ARCH}.tar.gz" mcp-env-keychain

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.release.outputs.target }}
          files: dist/mcp-env-keychain-macos-*.tar.gz

      - name: Publish package to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
