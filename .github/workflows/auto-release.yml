name: Auto release on PR merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref main \
            -f bump=patch \
            -R "$GITHUB_REPOSITORY"
