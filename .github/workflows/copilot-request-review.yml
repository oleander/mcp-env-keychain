# Copilot Request Review Workflow
#
# Purpose:
# Automatically requests a review from the Copilot code-review agent (`copilot-pull-request-reviewer[bot]`)
# whenever a code review is submitted on a pull request. To prevent infinite review loops between the
# cloud-agent and code-review-agent, the workflow counts prior Copilot review requests and enforces a
# configurable maximum (MAX_COPILOT_REVIEWS, default: 5).
#
# A Personal Access Token (PAT) with `Pull requests: write` permissions is preferred, as the GitHub
# Actions default token cannot request reviews from GitHub Apps.
name: Copilot Request Review

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: copilot-request-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  MAX_COPILOT_REVIEWS: "5"

jobs:
  request-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.COPILOT_REQUEST_PAT || github.token }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Ensure required tools
        run: |
          if ! command -v gh >/dev/null; then
            echo "::error::GitHub CLI (gh) is not installed!"
            exit 1
          fi
          if ! command -v jq >/dev/null; then
            echo "::error::jq is not installed!"
            exit 1
          fi

      - name: Count prior Copilot review requests
        id: count
        run: |
          count=$(gh api --paginate "repos/${GH_REPO}/issues/${PR_NUMBER}/timeline" |
            jq -s '
              add // []
              | [.[] | select(
                  .event == "review_requested"
                  and (.requested_reviewer.login // "" | ascii_downcase) == "copilot"
                )]
              | length
            ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Copilot has been requested $count time(s) (max: $MAX_COPILOT_REVIEWS)"

      - name: Request Copilot review if under limit
        if: fromJSON(steps.count.outputs.count) < fromJSON(env.MAX_COPILOT_REVIEWS)
        run: |
          set -euo pipefail

          echo "Requesting review from copilot-pull-request-reviewer[bot]..."

          gh api --method POST \
            "repos/${GH_REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f "reviewers[]=copilot-pull-request-reviewer[bot]" \
            >/dev/null

          # Verify if Copilot review is actually pending
          pending=$(gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            --jq '[.users[].login] | join(",")')
          echo "Pending reviewers after request: ${pending:-<none>}"

          if ! echo ",${pending}," | grep -iq ",copilot,"; then
            echo "::error::Copilot was not added as a PR reviewer."
            echo "TIP: Set the COPILOT_REQUEST_PAT secret to a PAT with 'Pull requests: write' in your repository, as the Actions default GITHUB_TOKEN cannot request reviews from GitHub Apps."
            exit 1
          else
            echo "✅ Copilot review requested successfully."
          fi

      - name: Post info if Copilot review limit is reached
        if: fromJSON(steps.count.outputs.count) >= fromJSON(env.MAX_COPILOT_REVIEWS)
        run: |
          echo "Copilot review request limit ($MAX_COPILOT_REVIEWS) reached. No further reviews will be requested automatically."
