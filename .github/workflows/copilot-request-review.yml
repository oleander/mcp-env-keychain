# Unified Copilot Review / Resolve / Bulk-Fix Workflow
#
# Reacts to every pull_request_review.submitted and routes by reviewer:
#   - cloud-agent (copilot-swe-agent / copilot-cloud-agent):
#       → Resolves all review threads whose last reply is from the cloud-agent.
#   - code-reviewer (copilot-pull-request-reviewer, user.id 175728472):
#       → Posts "@copilot deal with ALL review comments" so the cloud-agent
#         picks up the review and applies fixes.
#   - anyone else (humans, other bots):
#       → Requests a fresh code review from Copilot via the GraphQL
#         requestReviews mutation, with a configurable per-PR cap.
#
# Requires GH CLI, Node.js, and a COPILOT_REQUEST_PAT. For a classic PAT, use
# `repo`; for a fine-grained PAT, grant repository `Pull requests: write`.
# There is no standalone `graphql` PAT scope. GITHUB_TOKEN silently no-ops
# the requestReviews mutation for the Copilot bot — only a user PAT works.
#
# Trust model: workflow_dispatch requires write access to this repo. A user
# with write access can therefore pick any open PR number and any of the
# three routing branches (resolve threads, prompt cloud-agent, request
# Copilot review) by synthesizing review_user_id / review_user_login. The
# resolver step rejects malformed numeric inputs, but assume any repo
# writer can fire any branch on any open PR.

name: Copilot Review and Resolve

on:
  pull_request_review:
    types: [submitted]
  # Manual trigger for debugging / re-running specific branches. Inputs
  # mirror the github.event.review.user.* fields the step `if:` blocks
  # below read. Inputs metadata syntax:
  # https://docs.github.com/en/actions/reference/workflows-and-actions/metadata-syntax
  # All inputs flow into the workflow exclusively through env: vars and
  # ${{ inputs.* }} expressions in `if:`/`group:` contexts — never
  # interpolated into shell source.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to operate on'
        required: true
        # type: number is rejected client-side for non-numeric values, so
        # the runner blocks bad input before the job starts. The script
        # validation below in the resolver remains as defense-in-depth.
        type: number
      review_user_type:
        description: 'Synthesized github.event.review.user.type — gates the Bot-only cloud-agent branch'
        required: false
        default: 'Bot'
        type: choice
        options:
          - Bot
          - User
      review_user_id:
        description: 'Synthesized github.event.review.user.id (numeric, as string). 175728472 = copilot-pull-request-reviewer.'
        required: true
        type: string
      review_user_login:
        description: 'Synthesized github.event.review.user.login. Substring-matched for swe-agent / cloud-agent.'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Coalesce so workflow_dispatch (no pull_request payload) groups on inputs.pr_number.
  group: copilot-request-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

env:
  MAX_COPILOT_REVIEWS: "5"
  # In pull_request_review webhook payloads, Copilot bots present
  # review.user.login as the display alias "Copilot" rather than the
  # REST-API login (copilot-pull-request-reviewer[bot] /
  # copilot-swe-agent[bot]). We discriminate by numeric user.id, which is
  # stable across every GH API surface.
  CODE_REVIEWER_USER_ID: "175728472"  # copilot-pull-request-reviewer[bot]
  # TODO: capture copilot-swe-agent[bot] user.id from the next live cloud-
  # agent review and pin it here; until then Branch A falls back to a
  # tolerant login-substring match.
  # Globally stable GraphQL bot node ID for copilot-pull-request-reviewer
  # (login: copilot-pull-request-reviewer, createdAt: 2024-07-16). Used by
  # the requestReviews mutation, which is the only call that re-triggers
  # Copilot after it has already reviewed — the REST
  # /requested_reviewers POST silently no-ops on re-request.
  # Cross-reference: microsoft/vscode-pull-request-github exports the same
  # constant at src/common/copilot.ts:12 (COPILOT_REVIEWER_ID).
  # Re-verify both magic values with:
  #   gh api graphql -f query='query{node(id:"BOT_kgDOCnlnWA"){__typename ... on Bot{login databaseId createdAt}}}'
  COPILOT_BOT_NODE_ID: "BOT_kgDOCnlnWA"

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_TOKEN: ${{ secrets.COPILOT_REQUEST_PAT }}
      HAS_COPILOT_REQUEST_PAT: ${{ secrets.COPILOT_REQUEST_PAT != '' }}
      GH_REPO: ${{ github.repository }}
      # Coalesced so workflow_dispatch (no pull_request payload) falls back to inputs.pr_number.
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          # Run automation from the commit that supplied this workflow, not
          # from PR-head code, because this job has access to a write-capable PAT.
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Validate required Copilot request token
        if: env.HAS_COPILOT_REQUEST_PAT != 'true'
        run: node .github/scripts/copilot-review-and-resolve.mjs validate-token

      # ==== RESOLVE: unify webhook payload + workflow_dispatch inputs ====
      # All downstream `if:` conditions read steps.vars.outputs.* so they
      # behave identically under either trigger. On workflow_dispatch the
      # github.event.review.* fields are null — inputs synthesize them, and
      # pr_node_id is looked up via gh api against the validated PR number.
      # Inputs flow through env: vars so they can't be injected into script source.
      - name: Resolve effective inputs
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REVIEW_USER_TYPE: ${{ inputs.review_user_type }}
          INPUT_REVIEW_USER_ID: ${{ inputs.review_user_id }}
          INPUT_REVIEW_USER_LOGIN: ${{ inputs.review_user_login }}
          WEBHOOK_PR_NUMBER: ${{ github.event.pull_request.number }}
          WEBHOOK_PR_NODE_ID: ${{ github.event.pull_request.node_id }}
          WEBHOOK_REVIEW_USER_TYPE: ${{ github.event.review.user.type }}
          WEBHOOK_REVIEW_USER_ID: ${{ github.event.review.user.id }}
          WEBHOOK_REVIEW_USER_LOGIN: ${{ github.event.review.user.login }}
        run: node .github/scripts/copilot-review-and-resolve.mjs resolve-effective-inputs

      # ==== DEBUG: print every value used by step `if:` conditions ====
      # No `if:` — always runs. Each comparison value goes through env: so
      # untrusted strings (login, etc.) can't be injected into script source.
      # Three groups are printed:
      #   1. raw webhook payload (populated only on pull_request_review)
      #   2. workflow_dispatch inputs (populated only on manual trigger)
      #   3. effective resolver outputs (what conditions actually read)
      - name: Debug — dump all comparison inputs
        env:
          REVIEW_USER_ID: ${{ github.event.review.user.id }}
          REVIEW_USER_LOGIN: ${{ github.event.review.user.login }}
          REVIEW_USER_TYPE: ${{ github.event.review.user.type }}
          REVIEW_USER_NODE_ID: ${{ github.event.review.user.node_id }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_SUBMITTED_AT: ${{ github.event.review.submitted_at }}
          REVIEW_AUTHOR_ASSOCIATION: ${{ github.event.review.author_association }}
          REVIEW_COMMIT_ID: ${{ github.event.review.commit_id }}
          PR_NUMBER_RAW: ${{ github.event.pull_request.number }}
          PR_NODE_ID_RAW: ${{ github.event.pull_request.node_id }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          GH_ACTOR: ${{ github.actor }}
          GH_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REPOSITORY_OWNER: ${{ github.repository_owner }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REVIEW_USER_TYPE: ${{ inputs.review_user_type }}
          INPUT_REVIEW_USER_ID: ${{ inputs.review_user_id }}
          INPUT_REVIEW_USER_LOGIN: ${{ inputs.review_user_login }}
          OUT_PR_NUMBER: ${{ steps.vars.outputs.pr_number }}
          OUT_PR_NODE_ID: ${{ steps.vars.outputs.pr_node_id }}
          OUT_REVIEW_USER_TYPE: ${{ steps.vars.outputs.review_user_type }}
          OUT_REVIEW_USER_ID: ${{ steps.vars.outputs.review_user_id }}
          OUT_REVIEW_USER_LOGIN: ${{ steps.vars.outputs.review_user_login }}
        run: node .github/scripts/copilot-review-and-resolve.mjs debug-inputs

      # ==== CLOUDBOT: Resolve threads after its review ====
      - name: Resolve threads after cloud-agent review
        if: |
          steps.vars.outputs.review_user_type == 'Bot' &&
          steps.vars.outputs.review_user_id != env.CODE_REVIEWER_USER_ID &&
          (contains(steps.vars.outputs.review_user_login, 'swe-agent') ||
           contains(steps.vars.outputs.review_user_login, 'cloud-agent'))
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: node .github/scripts/copilot-review-and-resolve.mjs resolve-cloud-agent-threads

      # ==== CODE-REVIEWER: Prompt the cloud-agent to address its comments ====
      # Fires only when the code-reviewer bot (id 175728472) is the review
      # author. Posts a single @copilot mention so copilot-swe-agent[bot]
      # picks up the review and applies fixes. This replaces the dead
      # copilot-bulk-reviewfix.yml workflow (workflow_run: ["Copilot"] never
      # matched in practice because the dynamic "Copilot code review"
      # workflow lives outside the repo and doesn't emit workflow_run events
      # to it).
      - name: Prompt cloud-agent after code-reviewer review
        if: steps.vars.outputs.review_user_id == env.CODE_REVIEWER_USER_ID
        run: node .github/scripts/copilot-review-and-resolve.mjs prompt-cloud-agent

      # ==== CODE-REVIEW: Only request review if not code-review agent & under max ====
      - name: Count prior Copilot review requests
        id: count
        if: |
          steps.vars.outputs.review_user_id != env.CODE_REVIEWER_USER_ID &&
          !(steps.vars.outputs.review_user_type == 'Bot' &&
            (contains(steps.vars.outputs.review_user_login, 'swe-agent') ||
             contains(steps.vars.outputs.review_user_login, 'cloud-agent')))
        run: node .github/scripts/copilot-review-and-resolve.mjs count-prior-copilot-review-requests

      - name: Request Copilot review if under limit
        if: |
          steps.vars.outputs.review_user_id != env.CODE_REVIEWER_USER_ID &&
          !(steps.vars.outputs.review_user_type == 'Bot' &&
            (contains(steps.vars.outputs.review_user_login, 'swe-agent') ||
             contains(steps.vars.outputs.review_user_login, 'cloud-agent'))) &&
          fromJSON(steps.count.outputs.count) < fromJSON(env.MAX_COPILOT_REVIEWS)
        env:
          PR_NODE_ID: ${{ steps.vars.outputs.pr_node_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .github/scripts/copilot-review-and-resolve.mjs request-copilot-review

      - name: Post info if Copilot review limit is reached
        if: |
          steps.vars.outputs.review_user_id != env.CODE_REVIEWER_USER_ID &&
          !(steps.vars.outputs.review_user_type == 'Bot' &&
            (contains(steps.vars.outputs.review_user_login, 'swe-agent') ||
             contains(steps.vars.outputs.review_user_login, 'cloud-agent'))) &&
          fromJSON(steps.count.outputs.count) >= fromJSON(env.MAX_COPILOT_REVIEWS)
        run: node .github/scripts/copilot-review-and-resolve.mjs post-review-limit-reached
