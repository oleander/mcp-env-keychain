# This workflow automatically posts a single
# "@copilot deal with ALL review comments" comment on a pull request
# whenever the "Copilot" workflow completes successfully.
#
# Its purpose is to trigger the Copilot cloud-agent to address
# (fix and reply to) all open code review comments in bulk,
# streamlining the review resolution process.

name: Copilot Bulk Review Fix Trigger

on:
  workflow_run:
    workflows: ["Copilot"]
    types: [completed]

permissions:
  contents: write       # Needed to comment on PRs
  pull-requests: write  # Needed to comment on PRs

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Find PR number for workflow run's head SHA
        id: get_pr
        uses: actions/github-script@v7
        with:
          script: |
            // Get the completed workflow run's head SHA
            const runId = github.event.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get workflow run info to extract head_sha
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: runId,
            });

            // Find an open (or very recently closed) PR whose head matches the run SHA
            let prNumber = null;
            let page = 1, found = false;

            while (!found) {
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: "all",         // Search open and closed, covers cases like merged-after-workflow
                per_page: 50,
                page
              });

              if (prs.length === 0) break;

              for (const pr of prs) {
                if (pr.head.sha === run.head_sha) {
                  prNumber = pr.number
                  found = true;
                  break;
                }
              }
              page++;
            }

            if (!prNumber) {
              core.setFailed("No PR found associated with this workflow run's head SHA.");
              return;
            }
            core.setOutput('pr-number', prNumber);

      - name: Leave bulk Copilot review-fix comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.get_pr.outputs.pr-number }}
          body: |
            @copilot deal with ALL review comments
