# This workflow automatically posts a single
# "@copilot deal with ALL review comments" comment on a pull request
# whenever the "Copilot" workflow completes successfully.
#
# Its purpose is to trigger the Copilot cloud-agent to address
# (fix and reply to) all open code review comments in bulk,
# streamlining the review resolution process.
name: Copilot Bulk Review Fix Trigger

on:
  workflow_run:
    workflows: ["Copilot"]
    types: [completed]

permissions:
  contents: write      # Needed to comment on PRs
  pull-requests: write # Needed to comment on PRs

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download workflow run event payload
        uses: actions/download-artifact@v4
        with:
          name: workflow_run
        continue-on-error: true

      - name: Get PR number from workflow run
        id: get_pr
        uses: actions/github-script@v7
        with:
          script: |
            // We need to find the PR number attached to the workflow run
            const run_id = process.env.GITHUB_EVENT_WORKFLOW_RUN_ID || github.event.workflow_run.id;
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });
            // find the PR from the workflow run
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            // try to match head sha
            const targetPr = prs.find(pr => pr.head.sha === run.head_sha);
            if (!targetPr) {
              core.setFailed("No open PR found for this workflow run.");
              return;
            }
            core.setOutput('pr-number', targetPr.number);

      - name: Leave bulk Copilot comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.get_pr.outputs.pr-number }}
          body: |
            @copilot deal with ALL review comments
